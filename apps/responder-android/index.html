<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0F172A" />
    <title>Glance Responder</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; padding: 0; height: 100%;
        background: #0F172A; color: #E2E8F0;
        font-family: -apple-system, "SF Pro Display", "Inter", system-ui, sans-serif;
      }
      #app {
        min-height: 100vh; padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom);
        display: flex; flex-direction: column; gap: 16px;
      }
      header { padding: 20px 0 8px; }
      h1 { font-size: 22px; margin: 0; letter-spacing: -0.02em; }
      .sub { color: #94A3B8; font-size: 13px; margin-top: 4px; }
      .card {
        background: #111827; border: 1px solid #1E293B; border-radius: 14px;
        padding: 16px;
      }
      .status-dot {
        display: inline-block; width: 10px; height: 10px; border-radius: 50%;
        background: #64748B; margin-right: 8px; vertical-align: middle;
      }
      .status-dot.on { background: #22C55E; box-shadow: 0 0 8px #22C55E; }
      .status-dot.warn { background: #F59E0B; }
      .status-dot.err { background: #EF4444; }
      button {
        width: 100%; padding: 14px 16px; border-radius: 12px;
        border: 1px solid #1E293B; background: #1E293B; color: #E2E8F0;
        font-size: 15px; font-weight: 600; letter-spacing: -0.01em;
        margin-top: 8px;
      }
      button.primary { background: #3B82F6; border-color: #3B82F6; color: #fff; }
      button.ghost { background: transparent; }
      button:disabled { opacity: 0.4; }
      .row { display: flex; gap: 8px; }
      .row > button { flex: 1; }
      pre { white-space: pre-wrap; word-break: break-word; font-size: 12px; color: #64748B; }
      .kv { display: flex; justify-content: space-between; padding: 6px 0; font-size: 14px; }
      .kv .k { color: #94A3B8; }
      .hidden { display: none !important; }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Glance Responder</h1>
        <div class="sub" id="deviceLabel">Not paired</div>
      </header>

      <section id="pairView" class="card hidden">
        <div style="font-size:15px;font-weight:600;margin-bottom:6px;">Pair this device</div>
        <div class="sub" style="margin-bottom:12px;">
          Scan the QR code from Glance → Responders → Provision.
        </div>
        <button class="primary" id="scanBtn">Scan QR</button>
        <button class="ghost" id="manualBtn">Enter code manually</button>
      </section>

      <section id="statusView" class="card hidden">
        <div class="kv"><span class="k"><span id="statusDot" class="status-dot"></span>Status</span><span id="statusText">Idle</span></div>
        <div class="kv"><span class="k">Dispatch</span><span id="dispatchText">—</span></div>
        <div class="kv"><span class="k">Site</span><span id="siteText">—</span></div>
        <div class="kv"><span class="k">Last ping</span><span id="lastPing">—</span></div>
      </section>

      <section id="alertView" class="card hidden">
        <div style="font-size:15px;font-weight:600;margin-bottom:6px;color:#F59E0B;">🚨 What to look for</div>
        <div id="alertLabel" style="font-size:14px;font-weight:600;margin-bottom:4px;">—</div>
        <div id="alertMeta" class="sub" style="margin-bottom:10px;">—</div>
        <img id="alertSnapshot" alt="" style="width:100%;border-radius:10px;border:1px solid #1E293B;display:none;" />
      </section>

      <section id="actionsView" class="card hidden">
        <div class="sub">
          Fully automatic — acknowledge, en route, arrival and completion are detected from your movement and location. No taps required.
        </div>
      </section>


      <section class="card">
        <button class="ghost" id="unpairBtn">Unpair device</button>
        <pre id="log"></pre>
      </section>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
